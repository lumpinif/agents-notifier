name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  build-unix:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Build
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package
        run: |
          set -euo pipefail
          archive="agents-notifier-${{ matrix.target }}.tar.gz"
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/agents-notifier" package/
          tar -C package -czf "dist/${archive}" agents-notifier
          if command -v shasum >/dev/null 2>&1; then
            (cd dist && shasum -a 256 "${archive}" > "${archive}.sha256")
          else
            (cd dist && sha256sum "${archive}" > "${archive}.sha256")
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: agents-notifier-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  build-windows:
    name: Build x86_64-pc-windows-msvc
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-pc-windows-msvc

      - name: Build
        shell: pwsh
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          $target = "x86_64-pc-windows-msvc"
          $archive = "agents-notifier-$target.zip"
          New-Item -ItemType Directory -Path dist, package | Out-Null
          Copy-Item "target\$target\release\agents-notifier.exe" "package\agents-notifier.exe"
          Compress-Archive -Path "package\agents-notifier.exe" -DestinationPath "dist\$archive" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist\$archive").Hash.ToLowerInvariant()
          Set-Content -Path "dist\$archive.sha256" -Value "$hash  $archive"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: agents-notifier-x86_64-pc-windows-msvc
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-unix
      - build-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Build SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber
          else
            gh release create "${TAG}" dist/* --title "${TAG}" --generate-notes
          fi

      - name: Prepare npm package tarballs
        run: node scripts/prepare-npm-release.js --dist dist --out npm-packages --pack-destination npm-tarballs

      - name: Set up Node.js for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-npm-release.js --packages npm-packages

      - name: Upload npm package tarballs
        uses: actions/upload-artifact@v7
        with:
          name: agents-notifier-npm-packages
          path: npm-tarballs/*.tgz
          if-no-files-found: error
