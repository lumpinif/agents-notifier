name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Build
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package
        run: |
          set -euo pipefail
          archive="agents-notifier-${{ matrix.target }}.tar.gz"
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/agents-notifier" package/
          tar -C package -czf "dist/${archive}" agents-notifier
          (cd dist && shasum -a 256 "${archive}" > "${archive}.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agents-notifier-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-macos

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          cat *.sha256 > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber
          else
            gh release create "${TAG}" dist/* --title "${TAG}" --generate-notes
          fi
