name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Open or publish release PR
    runs-on: ubuntu-latest

    steps:
      - name: Validate release token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_PLEASE_TOKEN}" ]; then
            echo "Set the RELEASE_PLEASE_TOKEN repository secret before enabling release-please."
            echo "A PAT is required so release-please tags can trigger the tag-based Release workflow."
            exit 1
          fi

      - name: Run release-please
        uses: googleapis/release-please-action@v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
